<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PIXELBUILD Casino</title>
  <link rel="icon" href="../assets/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&display=swap">
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <div class="page">
    <header class="top">
      <div class="brand">
        <h1>PIXELBUILD CASINO</h1>
        <p>Risk & table games only for now.</p>
      </div>
      <div class="top-actions">
        <span class="chip" id="sessionChip">Session: Guest</span>
        <span class="chip" id="walletChip">Wallet: 0 WL</span>
        <button class="btn" id="toGameBtn" type="button">Back To Game</button>
      </div>
    </header>

    <section class="grid">
      <aside class="card">
        <h2>Account</h2>
        <div class="auth-fields">
          <input id="authUsername" class="input" type="text" maxlength="20" placeholder="Username">
          <input id="authPassword" class="input" type="password" maxlength="64" placeholder="Password">
          <div class="control-row tight">
            <button id="authCreateBtn" class="btn" type="button">Create</button>
            <button id="authLoginBtn" class="btn primary" type="button">Login</button>
          </div>
        </div>
        <div id="authStatus" class="status">Ready.</div>

        <h2 style="margin-top:14px;">Game Selection</h2>
        <div class="game-tabs">
          <button id="tabBlackjack" class="game-tab active" type="button">Blackjack</button>
          <button id="tabTower" class="game-tab" type="button">Tower</button>
          <button id="tabMines" class="game-tab" type="button">Mines</button>
        </div>

        <div class="controls">
          <div class="control-row">
            <button id="betDownBtn" class="btn" type="button">- Bet</button>
            <input id="betInput" class="input" type="number" min="1" step="1" value="10">
            <button id="betUpBtn" class="btn" type="button">+ Bet</button>
            <button id="betMaxBtn" class="btn" type="button">Max</button>
          </div>
          <div class="control-row tight" id="towerDifficultyWrap" style="display:none;">
            <select id="towerDifficulty" class="select">
              <option value="easy">Easy</option>
              <option value="normal" selected>Normal</option>
              <option value="hard">Hard</option>
              <option value="extreme">Extreme</option>
            </select>
            <button id="towerCashoutBtn" class="btn good" type="button">Cashout</button>
          </div>
          <div class="control-row tight" id="minesConfigWrap" style="display:none;">
            <select id="minesCount" class="select">
              <option value="1">1 mine</option>
              <option value="3">3 mines</option>
              <option value="5" selected>5 mines</option>
              <option value="7">7 mines</option>
              <option value="10">10 mines</option>
              <option value="15">15 mines</option>
              <option value="20">20 mines</option>
              <option value="24">24 mines</option>
            </select>
            <button id="minesCashoutBtn" class="btn good" type="button">Cashout</button>
          </div>
          <div class="control-row">
            <button id="spinBtn" class="btn primary" type="button">Spin / Start</button>
            <button id="bjHitBtn" class="btn" type="button" style="display:none;">Hit</button>
            <button id="bjStandBtn" class="btn" type="button" style="display:none;">Stand</button>
            <button id="bjDealBtn" class="btn" type="button" style="display:none;">Deal</button>
          </div>
        </div>

        <div id="gameStatus" class="status" style="margin-top:12px;">Choose a game and press Start.</div>
      </aside>

      <main class="card">
        <h2 id="boardTitle">Blackjack</h2>
        <div id="board" class="board"></div>

        <h2 style="margin-top:10px;">Recent Results</h2>
        <div id="history" class="history"></div>
      </main>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>

  <script src="../config/firebase-config.js"></script>
  <script src="../config/settings.js"></script>
  <script src="../items/catalog.js"></script>
  <script src="../system/db.js"></script>
  <script src="../system/auth.js"></script>
  <script src="../system/auth_storage.js"></script>
  <script src="./casino.js"></script>
</body>
</html>
